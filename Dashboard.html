<template id="tpl-dashboard">
<div>
  <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
    <div>
      <h1 class="text-xl font-bold text-slate-800">แดชบอร์ดภาพรวม</h1>
      <p class="text-sm text-slate-500" id="dashMonthLabel">กำลังโหลด...</p>
    </div>
    <div class="flex gap-2 items-center bg-white rounded-xl shadow-sm p-2 no-print flex-wrap">
      <div class="flex rounded-lg overflow-hidden border border-slate-300">
        <button id="btnViewMonth" class="px-3 py-1.5 text-sm bg-teal-700 text-white">รายเดือน</button>
        <button id="btnViewYear" class="px-3 py-1.5 text-sm bg-white text-slate-600">รายปี</button>
      </div>
      <select id="dashYear" class="border border-slate-300 rounded-lg px-2 py-1.5 text-sm"></select>
      <select id="dashMonth" class="border border-slate-300 rounded-lg px-2 py-1.5 text-sm"></select>
      <button id="btnDashFilter" class="bg-teal-700 hover:bg-teal-800 text-white text-sm rounded-lg px-3 py-1.5">แสดงข้อมูล</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-teal-600">
      <div class="text-xs text-slate-500" id="dashBudgetLabel">งบประมาณจัดสรรลงกลุ่ม (บาท)</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashBudget">-</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-indigo-500">
      <div class="text-xs text-slate-500">รวมแต้มส่วนเกินทั้งหมด</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashSurplus">-</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-amber-500">
      <div class="text-xs text-slate-500">ค่าเฉลี่ยเงิน/1 แต้ม (บาท)</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashRate">-</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-rose-500">
      <div class="text-xs text-slate-500">จำนวนเจ้าหน้าที่</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashStaffCount">-</div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-sky-500">
      <div class="text-xs text-slate-500">🏖️ ลาวันนี้</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashOnLeaveTodayCount">-</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-orange-500">
      <div class="text-xs text-slate-500">⏳ ใบลารออนุมัติ</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashPendingLeaveCount">-</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-slate-400">
      <div class="text-xs text-slate-500" id="dashLeaveDaysLabel">📅 วันลาสะสมเดือนนี้ (ทั้งกลุ่มงาน)</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashLeaveDaysCount">-</div>
      <div class="text-[11px] text-slate-400 mt-0.5">นับเฉพาะที่อนุมัติแล้ว</div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-indigo-500">
      <div class="text-xs text-slate-500" id="dashMeetingCountLabel">📚 การประชุม/อบรม/สัมมนาเดือนนี้ (ทั้งกลุ่มงาน)</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashMeetingCount">-</div>
      <div class="text-[11px] text-slate-400 mt-0.5">นับเฉพาะที่อนุมัติแล้ว</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-purple-500">
      <div class="text-xs text-slate-500" id="dashMeetingDaysLabel">🗓️ รวมจำนวนวันที่เข้าร่วมเดือนนี้</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashMeetingDays">-</div>
      <div class="text-[11px] text-slate-400 mt-0.5">นับเฉพาะที่อนุมัติแล้ว</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-amber-500">
      <div class="text-xs text-slate-500">⏳ คำขอเข้าร่วมประชุมฯ รออนุมัติ</div>
      <div class="text-2xl font-bold text-slate-800 mt-1" id="dashPendingMeetingCount">-</div>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h2 class="font-semibold text-slate-700 mb-3" id="dashLeaveByTypeLabel">📊 สถิติวันลาแยกตามประเภท (ทั้งกลุ่มงาน) — นับเฉพาะที่อนุมัติแล้ว</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="dashLeaveByTypeCards"></div>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
    <h2 class="font-semibold text-slate-700 mb-3">🏖️ วันนี้มีใครลาบ้าง</h2>
    <div id="dashOnLeaveTodayList" class="flex flex-wrap gap-2"></div>
    <div id="dashOnLeaveTodayEmpty" class="hidden text-sm text-slate-400">วันนี้ไม่มีผู้ลา</div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-5 gap-4">
    <div class="lg:col-span-3 bg-white rounded-xl shadow-sm p-4">
      <h2 class="font-semibold text-slate-700 mb-3" id="dashStaffChartLabel">แต้มรวมของเจ้าหน้าที่ (เดือนนี้)</h2>
      <canvas id="chartStaffPoints" height="220"></canvas>
    </div>
    <div class="lg:col-span-2 bg-white rounded-xl shadow-sm p-4">
      <h2 class="font-semibold text-slate-700 mb-3" id="dashTrendChartLabel">แนวโน้มแต้มรวมกลุ่มงาน (6 เดือนล่าสุด)</h2>
      <canvas id="chartTrend" height="220"></canvas>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-4 mt-4">
    <h2 class="font-semibold text-slate-700 mb-3" id="dashTableLabel">ตารางสรุปแต้ม-เงิน รายบุคคล (เดือนนี้)</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-sm p4p-table">
        <thead>
          <tr>
            <th class="px-3 py-2">ชื่อ-นามสกุล</th>
            <th class="px-3 py-2">ตำแหน่ง</th>
            <th class="px-3 py-2">แต้มที่ได้รวม</th>
            <th class="px-3 py-2">แต้มประกันขั้นต่ำ</th>
            <th class="px-3 py-2">ส่วนเกินแต้ม</th>
            <th class="px-3 py-2">จำนวนเงินที่ได้รับ (บาท)</th>
          </tr>
        </thead>
        <tbody id="dashTableBody"></tbody>
      </table>
    </div>
  </div>
</div>
</template>

<script>
  var _chartStaff = null, _chartTrend = null;
  var _dashViewMode = 'month';
  var LEAVE_TYPES_DASH = ['ลาพักผ่อน', 'ลาป่วย', 'ลากิจส่วนตัว', 'ลาคลอดบุตร'];

  function initDashboardPage() {
    var now = new Date();
    fillYearSelect(document.getElementById('dashYear'), nowBEYear());
    fillMonthSelect(document.getElementById('dashMonth'), now.getMonth() + 1);
    document.getElementById('btnDashFilter').addEventListener('click', loadDashboard);
    document.getElementById('btnViewMonth').addEventListener('click', function() { setDashViewMode('month'); });
    document.getElementById('btnViewYear').addEventListener('click', function() { setDashViewMode('year'); });
    setDashViewMode('month');
  }

  function setDashViewMode(mode) {
    _dashViewMode = mode;
    var monthBtn = document.getElementById('btnViewMonth');
    var yearBtn = document.getElementById('btnViewYear');
    monthBtn.className = 'px-3 py-1.5 text-sm ' + (mode === 'month' ? 'bg-teal-700 text-white' : 'bg-white text-slate-600');
    yearBtn.className = 'px-3 py-1.5 text-sm ' + (mode === 'year' ? 'bg-teal-700 text-white' : 'bg-white text-slate-600');
    document.getElementById('dashMonth').classList.toggle('hidden', mode === 'year');
    loadDashboard();
  }

  function loadDashboard() {
    var yearBE = document.getElementById('dashYear').value;
    var month = document.getElementById('dashMonth').value;
    showLoading(true);
    callServer('getDashboardData', APP.token, yearBE, month, _dashViewMode).then(function(data) {
      showLoading(false);
      renderDashboard(data);
    }).catch(function(err) {
      showLoading(false);
      fireError(err);
    });
  }

  function renderDashboard(data) {
    var isYear = data.viewMode === 'year';

    document.getElementById('dashMonthLabel').textContent = isYear ?
      'ข้อมูลประจำปี พ.ศ. ' + data.yearBE + ' (รวมทั้ง 12 เดือน)' :
      'ข้อมูลประจำเดือน ' + data.monthName + ' พ.ศ. ' + data.yearBE;

    document.getElementById('dashBudgetLabel').textContent = isYear ? 'งบประมาณจัดสรรลงกลุ่มทั้งปี (บาท)' : 'งบประมาณจัดสรรลงกลุ่ม (บาท)';
    document.getElementById('dashLeaveDaysLabel').textContent = isYear ? '📅 วันลาสะสมปีนี้ (ทั้งกลุ่มงาน)' : '📅 วันลาสะสมเดือนนี้ (ทั้งกลุ่มงาน)';
    document.getElementById('dashMeetingCountLabel').textContent = isYear ? '📚 การประชุม/อบรม/สัมมนาปีนี้ (ทั้งกลุ่มงาน)' : '📚 การประชุม/อบรม/สัมมนาเดือนนี้ (ทั้งกลุ่มงาน)';
    document.getElementById('dashMeetingDaysLabel').textContent = isYear ? '🗓️ รวมจำนวนวันที่เข้าร่วมปีนี้' : '🗓️ รวมจำนวนวันที่เข้าร่วมเดือนนี้';
    document.getElementById('dashLeaveByTypeLabel').textContent = '📊 สถิติวันลาแยกตามประเภท (ทั้งกลุ่มงาน' + (isYear ? ' - ทั้งปี' : ' - เดือนนี้') + ') — นับเฉพาะที่อนุมัติแล้ว';
    document.getElementById('dashStaffChartLabel').textContent = isYear ? 'แต้มรวมของเจ้าหน้าที่ (ทั้งปี)' : 'แต้มรวมของเจ้าหน้าที่ (เดือนนี้)';
    document.getElementById('dashTrendChartLabel').textContent = isYear ? 'แนวโน้มแต้มรวมกลุ่มงาน (12 เดือนของปีนี้)' : 'แนวโน้มแต้มรวมกลุ่มงาน (6 เดือนล่าสุด)';
    document.getElementById('dashTableLabel').textContent = isYear ? 'ตารางสรุปแต้ม-เงิน รายบุคคล (สะสมทั้งปี)' : 'ตารางสรุปแต้ม-เงิน รายบุคคล (เดือนนี้)';

    var s = data.summary;
    document.getElementById('dashBudget').textContent = numFmt(s.budget, 2);
    document.getElementById('dashSurplus').textContent = numFmt(s.totalSurplus, 2);
    document.getElementById('dashRate').textContent = numFmt(s.rate, 3);
    document.getElementById('dashStaffCount').textContent = s.staff.length;

    // ข้อมูลวันลา
    var leave = data.leave || { onLeaveToday: [], pendingRequestsCount: 0, approvedLeaveDaysCount: 0, leaveByType: {} };
    document.getElementById('dashOnLeaveTodayCount').textContent = leave.onLeaveToday.length;
    document.getElementById('dashPendingLeaveCount').textContent = leave.pendingRequestsCount;
    document.getElementById('dashLeaveDaysCount').textContent = leave.approvedLeaveDaysCount;

    var meeting = data.meeting || { approvedCount: 0, totalDays: 0, pendingRequestsCount: 0 };
    document.getElementById('dashMeetingCount').textContent = meeting.approvedCount;
    document.getElementById('dashMeetingDays').textContent = meeting.totalDays;
    document.getElementById('dashPendingMeetingCount').textContent = meeting.pendingRequestsCount;

    // การ์ดสถิติวันลาแยกประเภท
    var colors = {
      'ลาพักผ่อน': 'border-sky-500', 'ลาป่วย': 'border-rose-500',
      'ลากิจส่วนตัว': 'border-amber-500', 'ลาคลอดบุตร': 'border-purple-500'
    };
    var typeCardsEl = document.getElementById('dashLeaveByTypeCards');
    typeCardsEl.innerHTML = '';
    LEAVE_TYPES_DASH.forEach(function(t) {
      var card = document.createElement('div');
      card.className = 'bg-slate-50 rounded-lg p-3 border-l-4 ' + (colors[t] || 'border-slate-400');
      card.innerHTML = '<div class="text-xs text-slate-500">' + t + '</div><div class="text-xl font-bold text-slate-800 mt-1">' + (leave.leaveByType[t] || 0) + ' <span class="text-xs font-normal text-slate-400">วัน</span></div>';
      typeCardsEl.appendChild(card);
    });

    var leaveListEl = document.getElementById('dashOnLeaveTodayList');
    var leaveEmptyEl = document.getElementById('dashOnLeaveTodayEmpty');
    leaveListEl.innerHTML = '';
    if (!data.isCurrentMonth) {
      leaveEmptyEl.classList.remove('hidden');
      leaveEmptyEl.textContent = 'แสดงได้เฉพาะตอนดูเดือนปัจจุบันเท่านั้น';
    } else if (leave.onLeaveToday.length === 0) {
      leaveEmptyEl.classList.remove('hidden');
      leaveEmptyEl.textContent = 'วันนี้ไม่มีผู้ลา';
    } else {
      leaveEmptyEl.classList.add('hidden');
      leave.onLeaveToday.forEach(function(p) {
        var statusCls = p.status === 'อนุมัติ' ? 'bg-sky-100 text-sky-700' : 'bg-amber-100 text-amber-700';
        var chip = document.createElement('span');
        chip.className = 'text-xs px-3 py-1.5 rounded-full ' + statusCls;
        chip.textContent = p.fullName + ' — ' + p.leaveType + (p.status === 'รออนุมัติ' ? ' (รออนุมัติ)' : '');
        leaveListEl.appendChild(chip);
      });
    }

    // table
    var tbody = document.getElementById('dashTableBody');
    tbody.innerHTML = '';
    s.staff.sort(function(a, b) { return b.grandTotal - a.grandTotal; }).forEach(function(r) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="px-3 py-2">' + r.fullName + '</td>' +
        '<td class="px-3 py-2 text-center">' + (r.position || '') + '</td>' +
        '<td class="px-3 py-2 text-center">' + numFmt(r.grandTotal, 2) + '</td>' +
        '<td class="px-3 py-2 text-center">' + (r.minGuarantee != null ? numFmt(r.minGuarantee, 2) : '-') + '</td>' +
        '<td class="px-3 py-2 text-center">' + (r.surplus != null ? numFmt(r.surplus, 2) : '-') + '</td>' +
        '<td class="px-3 py-2 text-center font-semibold text-teal-700">' + numFmt(r.amount, 2) + '</td>';
      tbody.appendChild(tr);
    });

    // bar chart: staff points
    var ctx1 = document.getElementById('chartStaffPoints').getContext('2d');
    if (_chartStaff) _chartStaff.destroy();
    _chartStaff = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: s.staff.map(function(r) { return r.fullName; }),
        datasets: [{
          label: 'แต้มรวม',
          data: s.staff.map(function(r) { return r.grandTotal; }),
          backgroundColor: '#0d9488'
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });

    // line chart: trend
    var ctx2 = document.getElementById('chartTrend').getContext('2d');
    if (_chartTrend) _chartTrend.destroy();
    _chartTrend = new Chart(ctx2, {
      type: 'line',
      data: {
        labels: data.trend.map(function(t) { return t.label; }),
        datasets: [
          {
            label: 'แต้มรวมกลุ่มงาน',
            data: data.trend.map(function(t) { return t.totalPoints; }),
            borderColor: '#0d9488', backgroundColor: '#99f6e4', tension: 0.3
          }
        ]
      },
      options: { responsive: true }
    });
  }
</script>
