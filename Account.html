<template id="tpl-account">
<div class="max-w-md">
  <h1 class="text-xl font-bold text-slate-800 mb-1">บัญชีของฉัน</h1>
  <p class="text-sm text-slate-500 mb-5">เปลี่ยนรหัสผ่านสำหรับเข้าสู่ระบบ</p>

  <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
    <div id="accountInfo" class="text-sm text-slate-600 space-y-1 mb-4"></div>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-5">
    <h2 class="font-semibold text-slate-700 mb-3">เปลี่ยนรหัสผ่าน</h2>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-slate-500">รหัสผ่านเดิม</label>
        <input id="oldPassword" type="password" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mt-1">
      </div>
      <div>
        <label class="text-xs text-slate-500">รหัสผ่านใหม่</label>
        <input id="newPassword" type="password" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mt-1">
      </div>
      <div>
        <label class="text-xs text-slate-500">ยืนยันรหัสผ่านใหม่</label>
        <input id="confirmPassword" type="password" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mt-1">
      </div>
      <button id="btnChangePassword" class="w-full bg-teal-700 hover:bg-teal-800 text-white font-medium rounded-lg py-2.5 mt-2">เปลี่ยนรหัสผ่าน</button>
    </div>
  </div>
</div>
</template>

<script>
  function initAccountPage() {
    var roleLabel = { staff: 'เจ้าหน้าที่', head: 'หัวหน้ากลุ่มงาน', admin: 'ผู้ดูแลระบบ' }[APP.user.role] || APP.user.role;
    document.getElementById('accountInfo').innerHTML =
      '<div><span class="text-slate-400">ชื่อ-นามสกุล:</span> ' + APP.user.fullName + '</div>' +
      '<div><span class="text-slate-400">ตำแหน่ง:</span> ' + (APP.user.position || '-') + '</div>' +
      '<div><span class="text-slate-400">ระดับ:</span> ' + (APP.user.level || '-') + '</div>' +
      '<div><span class="text-slate-400">เลขที่ใบประกอบวิชาชีพ:</span> ' + (APP.user.licenseNo || '-') + '</div>' +
      '<div><span class="text-slate-400">Username:</span> ' + APP.user.username + '</div>' +
      '<div><span class="text-slate-400">สิทธิ์การใช้งาน:</span> ' + roleLabel + '</div>' +
      '<div><span class="text-slate-400">แต้มประกันขั้นต่ำ:</span> ' + numFmt(APP.user.minGuaranteePoints, 2) + '</div>';

    document.getElementById('btnChangePassword').addEventListener('click', function() {
      var oldPw = document.getElementById('oldPassword').value;
      var newPw = document.getElementById('newPassword').value;
      var confirmPw = document.getElementById('confirmPassword').value;
      if (!oldPw || !newPw) { toast('error', 'กรุณากรอกข้อมูลให้ครบถ้วน'); return; }
      if (newPw !== confirmPw) { toast('error', 'รหัสผ่านใหม่ไม่ตรงกัน'); return; }
      if (newPw.length < 6) { toast('error', 'รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร'); return; }

      showLoading(true);
      callServer('changePassword', APP.token, oldPw, newPw).then(function(res) {
        showLoading(false);
        if (!res.ok) { toast('error', res.message); return; }
        toast('success', res.message);
        document.getElementById('oldPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
      }).catch(function(err) { showLoading(false); fireError(err); });
    });
  }
</script>
